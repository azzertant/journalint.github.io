        <meta charset="UTF-8">

        <title>Accueil — MineGarp</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">

        <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
        <style>
      :root {
        --bg: #3d3d3f;
        --panel: #2f2f31;
        --text: #f2f2f2;
        --muted: #cfcfcf;
        --accent: #e5e5e5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: block; 
        font-family: "Kanit", "Noto Sans Thai", "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(1200px 800px at 20% 10%, #4a4a4d 0%, var(--bg) 55%);
        color: var(--text);
        overflow-x: hidden;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 0;
      }

      .text-bg-shape {
        width: 100%;
        margin-top: 0;
        margin-left: 0;
        margin-right: 0;

        min-height: 500px;
        background-image: url('BannerPED.png'); 
        background-size: cover; 
        background-position: center;
        background-repeat: no-repeat;
        background: linear-gradient(rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.5)), url('assets/BannerPED.png');
        background-size: cover;
        background-position: center;
        color: #F1F1F1; /* ต้องใส่สีเข้มเพราะพื้นหลังสว่าง */
        padding: 40px 10%;
        margin-bottom: 50px; /* ระยะห่างก่อนถึงเนื้อหาถัดไป */
        border-radius: 0px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      }

      .page {
        width: min(1100px, 92vw);
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        align-items: center;
        gap: 24px;
        padding: 32px 0;
      }

      .delta {
        max-width: 560px;
      }

      .content-box {
        padding-top: 100px;
        padding-bottom: 100px;
        background: #f4f4f4;
        color: #333;
        text-align: center;
      }

      h1 {
        margin: 0 0 4px;
        font-size: clamp(36px, 6vw, 60px);
        line-height: 1.05;
        font-weight: 800;
        letter-spacing: 0.2px;
      }

      .h2 {
        margin: 0 0 4px;
        font-size: clamp(36px, 6vw, 60px);
        line-height: 1.05;
        font-weight: 800;
        letter-spacing: 0.2px;
      }

      .soustitre {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 18px;
      }

      .sousnom {
        font-size: clamp(22px, 3.2vw, 34px);
        font-weight: 700;
      }

      .ligne-top {
        height: 2px;
        width: 45%;
        background: var(--accent);
        opacity: 0.6;
      }

      .ligne {
        height: 2px;
        width: 100%;
        background: var(--accent);
        opacity: 0.6;
      }

      .description {
        font-size: 16px;
        line-height: 1.7;
        color: var(--muted);
        margin: 0 0 32px;
      }
      
      .titlelink {
        font-size: 24px;
        text-align: center;
        padding-bottom: 25px;
      }

      .socialmedia {
        font-size: 16px;
        line-height: 1.8;
        align-items: center;
      }

      .socialbuttons {
        display: block;
        width: 48px;  /* ลองปรับตัวเลขนี้ */
        color: white;
      }

      .social-icon svg {
        width: 100%;
        height: auto;
        display: block;
        color: white;
      }

      .social-link {
        display: flex;
        align-items: center;
        gap: 24px;
        flex-wrap: nowrap;
      }

      .foot {
        font-size: 18px;
        line-height: 1.7;
        color: var(--muted);
        margin: 0 0 32px;
        text-align: center;
        padding-bottom: 25px;
      }

    </style>
    </head>
